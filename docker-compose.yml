services:
  db:
    image: pgvector/pgvector:pg16
    container_name: ranything-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ranything
      POSTGRES_PASSWORD: ranything
      POSTGRES_DB: ranything
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ranything -d ranything"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: ranything-app
    restart: unless-stopped
    ports:
      - "${PORT:-8000}:8000"
    environment:
      DATABASE_URL: postgresql://ranything:ranything@db:5432/ranything
      DATA_DIR: /data
      HOST: 0.0.0.0
      PORT: 8000
      JWT_SECRET: ${JWT_SECRET:-change-me-dev-only-not-for-production}
      AUTH_REQUIRED: ${AUTH_REQUIRED:-true}
      EXTERNAL_API_TOKEN: ${EXTERNAL_API_TOKEN:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-gemini}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_API_KEYS: ${GEMINI_API_KEYS:-}
      ENABLE_GRAPH_RAG: ${ENABLE_GRAPH_RAG:-false}
      # Cache model Hugging Face trong volume
      HF_HOME: /data/huggingface
      TRANSFORMERS_CACHE: /data/huggingface
    volumes:
      - app_data:/data
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  app_data:
